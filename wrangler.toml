name = "otterhub"
compatibility_date = "2026-01-01"
pages_build_output_dir = "frontend/out"

[observability]
enabled = true

# KV Namespace 绑定（必填）
[[kv_namespaces]]
binding = "oh_file_url"
id = "your-kv-namespace-id"  # 在 Cloudflare Dashboard → Workers & Pages → KV 中创建后获取 ID

# R2 Bucket 绑定（可选，生产环境使用 Telegram 存储时可省略）
# [[r2_buckets]]
# binding = "oh_file_r2"
# bucket_name = "your-r2-bucket-name"  # 在 Cloudflare Dashboard → R2 中创建

# AI Binding（可选，用于图片智能分析）
# [ai]
# binding = "AI"
